<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>CamBridge</title>
    <link rel="stylesheet" href="/css/tokens.css" />
    <style>
      body {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .hero {
        max-width: 440px;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding: 24px;
      }
      .big {
        font-size: 24px;
        letter-spacing: 0.04em;
      }
      p {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
        margin: 0;
      }
      a.btn {
        text-decoration: none;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <div class="wordmark big">CAMBRIDGE <span class="sep">//</span> <span class="accent">P2P CAMERA</span></div>
      <p>Stream from any device's camera straight into OBS, peer-to-peer. Create a link, drop it into a Browser Source, go live from anywhere.</p>
      <a class="btn primary" href="/broadcaster.html">Start a stream</a>
    </div>
  </body>
</html>
