<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>CamBridge — Viewer</title>
    <link rel="stylesheet" href="css/tokens.css" />
    <style>
      html,
      body {
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #stage {
        position: fixed;
        inset: 0;
        background: #000;
      }
      #video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
        display: block;
      }
      /* Transparent background mode for OBS: ?bg=transparent */
      body.transparent,
      body.transparent #stage,
      body.transparent #video {
        background: transparent;
      }
      #standby {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: var(--bg);
        color: var(--muted);
        text-align: center;
      }
      #standby.hidden {
        display: none;
      }
      #standby .title {
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text);
      }
      #standby .sub {
        font-size: 11px;
        letter-spacing: 0.08em;
      }
      .pulse {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--warn);
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <video id="video" autoplay playsinline></video>
    </div>
    <div id="standby">
      <div class="pulse"></div>
      <div class="title" id="standbyTitle">Waiting for signal</div>
      <div class="sub" id="standbySub">CAMBRIDGE&nbsp;//&nbsp;VIEWER</div>
    </div>
    <script type="module" src="js/viewer.js"></script>
  </body>
</html>
